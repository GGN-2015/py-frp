name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install .
      - name: Run test suite
        run: python -m unittest discover -s tests
      - name: Exercise terminal-attached restart
        run: python -c "import logging; logging.basicConfig(level=logging.INFO); from py_frp.update import restart_current_command; restart_current_command(['--version'])"
