name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install .
      - name: Run test suite
        run: python -m unittest discover -s tests
      - name: Exercise installed CLI entry point
        run: py-frp --version

  python36-native:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.6"
          architecture: x64
      - name: Install package
        run: python -m pip install .
      - name: Run Python 3.6 end-to-end tests
        run: python tests/test_python36.py
      - name: Exercise installed CLI entry point
        run: py-frp --version

  legacy-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6", "3.7", "3.8"]
    steps:
      - uses: actions/checkout@v6
      - name: Test in official legacy Python container
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/workspace" \
            --workdir /workspace \
            python:${{ matrix.python-version }} \
            bash -c '
              set -o pipefail
              {
                python -m pip install . &&
                python tests/test_python36.py &&
                py-frp --version
              } 2>&1 | tee /tmp/py-frp-legacy-test.log
              status=${PIPESTATUS[0]}
              if [ "$status" -ne 0 ]; then
                message=$(tail -c 4000 /tmp/py-frp-legacy-test.log | tr "\n" " " | sed "s/%/%25/g")
                printf "::error title=Legacy Python container failed::%s\n" "$message"
              fi
              exit "$status"
            '
